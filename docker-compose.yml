services:
  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://talent:talent@db:5432/talent
    ports: ["8000:8000"]
    depends_on: [db]
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: talent
      POSTGRES_PASSWORD: talent
      POSTGRES_DB: talent
    ports: ["5432:5432"]
    volumes: ["talent-db:/var/lib/postgresql/data"]
volumes:
  talent-db:
